<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PatrickHomeLab - Profile</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #f0f6fc;
      line-height: 1.6;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 17, 23, 0.95);
      border-bottom: 1px solid #30363d;
      backdrop-filter: blur(10px);
    }

    nav {
      max-width: 1400px;
      margin: 0 auto;
      padding: 18px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav strong {
      font-size: 20px;
      color: #f0f6fc;
    }

    nav div:last-child {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    nav a {
      color: #c9d1d9;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s ease;
    }

    nav a:hover {
      color: #58a6ff;
    }

    .hero {
      background:
        linear-gradient(rgba(13,17,23,0.72), rgba(13,17,23,0.88)),
        url("images/lab-topology.png") center/cover no-repeat;
      text-align: center;
      padding: 140px 20px 120px;
      border-bottom: 1px solid #30363d;
    }

    .hero-content {
      max-width: 900px;
      margin: 0 auto;
    }

    .hero h1 {
      font-size: 58px;
      margin-bottom: 18px;
    }

    .hero p {
      color: #9da7b3;
      font-size: 20px;
      max-width: 760px;
      margin: 0 auto;
    }

    .container {
      max-width: 1500px;
      margin: 0 auto;
      padding: 70px 40px 90px;
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
      margin-bottom: 70px;
    }

    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 18px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);
    }

    .stat-card h3 {
      color: #58a6ff;
      font-size: 30px;
      margin-bottom: 10px;
    }

    .stat-card p {
      color: #9da7b3;
      font-size: 14px;
    }

    .section-title {
      text-align: center;
      font-size: 36px;
      margin-bottom: 18px;
    }

    .section-subtitle {
      text-align: center;
      color: #9da7b3;
      max-width: 850px;
      margin: 0 auto 50px;
    }

    .systems-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      margin-bottom: 80px;
    }

    .system-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 18px;
      padding: 28px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .system-card:hover {
      transform: translateY(-4px);
      border-color: #58a6ff;
    }

    .system-card h3 {
      margin-bottom: 14px;
      font-size: 22px;
    }

    .system-card p {
      color: #9da7b3;
      margin-bottom: 18px;
      font-size: 14px;
    }

    .system-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .system-tags span {
      background: rgba(88, 166, 255, 0.12);
      border: 1px solid rgba(88, 166, 255, 0.35);
      color: #58a6ff;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
    }

    .dashboard-preview {
      margin-top: 30px;
      border: 1px solid #30363d;
      border-radius: 18px;
      overflow: hidden;
      background: #161b22;
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);
    }

    .dashboard-preview img {
      width: 100%;
      display: block;
    }

    footer {
      border-top: 1px solid #30363d;
      text-align: center;
      color: #8b949e;
      padding: 30px 20px;
      font-size: 14px;
      margin-top: 80px;
    }

    @media (max-width: 768px) {
      nav {
        flex-direction: column;
        gap: 16px;
      }

      nav div:last-child {
        flex-wrap: wrap;
        justify-content: center;
      }

      .hero h1 {
        font-size: 40px;
      }

      .hero p {
        font-size: 18px;
      }

      .container {
        padding: 50px 20px 70px;
      }

      .stats-strip,
      .systems-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <div><strong>PatrickHomeLab</strong></div>

      <div>
        <a href="index.html">Home</a>
        <a href="profile.html">Profile</a>
        <a href="architecture.html">Architecture</a>
        <a href="topology.html">Topology</a>
        <a href="projects.html">Projects</a>
        <a href="monitoring.html">Monitoring</a>
        
        <a href="https://github.com/patrick-richardson" target="_blank">GitHub</a>
      </div>
    </nav>
  </header>

   <section class="hero">
    <div class="hero-content">
      <h1>Profile</h1>
      <p>Systems engineering, infrastructure, automation, and homelab development.</p>
    </div>
  </section>

</body>
</html>
