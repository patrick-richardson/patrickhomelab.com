<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f1720;
  color: #e6edf3;
  line-height: 1.6;
}

header {
  background: #0f1720;
  border-bottom: 1px solid #2a3440;
  padding: 18px;
}

nav {
  max-width: 1400px;
  margin: auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav a {
  color: #d0d7de;
  text-decoration: none;
  margin-left: 24px;
  font-weight: 500;
}

nav a:hover {
  color: #58a6ff;
}

.hero {
  height: 300px;
  background:
    linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.65)),
    url("images/lab-topology.png");
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 20px;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 12px;
}

.hero p {
  color: #b8c2cc;
  max-width: 780px;
  margin: auto;
  font-size: 18px;
}

.container {
  max-width: 1400px;
  margin: auto;
  padding: 70px 24px;
}

.section-title {
  text-align: center;
  margin-bottom: 18px;
  font-size: 34px;
}

.section-intro {
  text-align: center;
  max-width: 850px;
  margin: 0 auto 50px auto;
  color: #9da7b3;
  font-size: 17px;
}

.topology-layout {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 36px;
  align-items: start;
}

.topology-image-wrapper {
  display: flex;
  flex-direction: column;
}

.architecture-image {
  width: 100%;
  border-radius: 16px;
  border: 1px solid #30363d;
  box-shadow: 0 24px 50px rgba(0,0,0,.45);
}

.topology-note {
  margin-top: 16px;
  text-align: center;
  color: #8b949e;
  font-size: 14px;
}

.topology-details {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.topology-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 14px;
  padding: 20px;
}

.topology-card h3 {
  margin: 0 0 8px 0;
}

.topology-card p {
  margin: 0;
  color: #9da7b3;
}

.focus-section {
  margin-top: 70px;
}

.focus-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 18px;
  margin-top: 30px;
}

.focus-item {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 14px;
  padding: 20px;
  text-align: center;
  font-weight: 600;
}

footer {
  text-align: center;
  padding: 40px;
  color: #9da7b3;
  border-top: 1px solid #2a3440;
  margin-top: 80px;
}

@media (max-width: 1000px) {
  .topology-layout {
    grid-template-columns: 1fr;
  }

  nav {
    flex-direction: column;
    gap: 12px;
  }

  nav a {
    margin: 0 10px;
  }
}
</style>
